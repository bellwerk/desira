name: Deploy to Cloudflare Workers

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        run: npm install -g pnpm@10.26.2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (OpenNext for Cloudflare)
        run: pnpm exec opennextjs-cloudflare build
        env:
          # Public vars (non-sensitive, exposed in client bundle anyway)
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SITE_URL: "https://app.desira.gift"
          # Secrets (sensitive, server-side only)
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

      - name: Deploy to Cloudflare (retry)
        # --keep-vars preserves runtime environment variables set in Cloudflare dashboard
        shell: bash
        run: |
          set -euo pipefail
          attempt=1
          max_attempts=3
          backoff_seconds=30

          while true; do
            echo "Cloudflare deploy attempt ${attempt}/${max_attempts}"
            if pnpm exec opennextjs-cloudflare deploy -- --keep-vars; then
              echo "Cloudflare deploy succeeded"
              break
            fi

            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "Cloudflare deploy failed after ${max_attempts} attempts"
              exit 1
            fi

            echo "Deploy attempt ${attempt} failed; retrying in ${backoff_seconds}s"
            sleep "${backoff_seconds}"
            attempt=$((attempt + 1))
            backoff_seconds=$((backoff_seconds * 2))
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: debug

      # NOTE: NEXT_PUBLIC_* vars are inlined at build time (see Build step env above).
      # Server-side runtime secrets (SUPABASE_SERVICE_ROLE_KEY, STRIPE_SECRET_KEY, etc.)
      # are set via Cloudflare Dashboard and preserved across deploys by --keep-vars.
