name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.26.2 --activate

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        env:
          # placeholders (build should not require real secrets)
          NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "example"
          SUPABASE_SERVICE_ROLE_KEY: "example"
          STRIPE_SECRET_KEY: "sk_test_example"
          STRIPE_WEBHOOK_SECRET: "whsec_example"
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.26.2 --activate

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Start Supabase local stack
        run: pnpm supabase start

      - name: Export Supabase env vars for Next.js
        shell: bash
        run: |
          set -euo pipefail
          SUPABASE_ENV="$(pnpm supabase status -o env)"
          API_URL="$(echo "$SUPABASE_ENV" | awk -F= '$1=="API_URL"{print $2}')"
          ANON_KEY="$(echo "$SUPABASE_ENV" | awk -F= '$1=="ANON_KEY"{print $2}')"
          SERVICE_ROLE_KEY="$(echo "$SUPABASE_ENV" | awk -F= '$1=="SERVICE_ROLE_KEY"{print $2}')"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
          echo "ALLOW_SEED=true" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3000" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_APP_URL=http://127.0.0.1:3000" >> "$GITHUB_ENV"

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: pnpm e2e
