name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.26.2 --activate

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        env:
          # placeholders (build should not require real secrets)
          NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "example"
          SUPABASE_SERVICE_ROLE_KEY: "example"
          STRIPE_SECRET_KEY: "sk_test_example"
          STRIPE_WEBHOOK_SECRET: "whsec_example"
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.26.2 --activate

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Start Supabase local stack
        run: pnpm supabase start

      - name: Export Supabase env vars for Next.js
        shell: bash
        run: |
          set -euo pipefail
          SUPABASE_ENV="$(pnpm supabase status -o env)"
          API_URL_RAW="$(echo "$SUPABASE_ENV" | awk -F= '$1=="API_URL"{print $2}')"
          ANON_KEY_RAW="$(echo "$SUPABASE_ENV" | awk -F= '$1=="ANON_KEY"{print $2}')"
          SERVICE_ROLE_KEY_RAW="$(echo "$SUPABASE_ENV" | awk -F= '$1=="SERVICE_ROLE_KEY"{print $2}')"
          API_URL="$(echo "$API_URL_RAW" | sed -e 's/^"//' -e 's/"$//')"
          ANON_KEY="$(echo "$ANON_KEY_RAW" | sed -e 's/^"//' -e 's/"$//')"
          SERVICE_ROLE_KEY="$(echo "$SERVICE_ROLE_KEY_RAW" | sed -e 's/^"//' -e 's/"$//')"
          if [ -z "${API_URL}" ]; then
            echo "Supabase status did not return API_URL"
            exit 1
          fi
          if [[ ! "${API_URL}" =~ ^https?:// ]]; then
            echo "Invalid API_URL from local Supabase status: ${API_URL}"
            exit 1
          fi
          if [ -z "${ANON_KEY}" ]; then
            echo "Supabase status did not return ANON_KEY"
            exit 1
          fi
          if [ -z "${SERVICE_ROLE_KEY}" ]; then
            echo "Supabase status did not return SERVICE_ROLE_KEY"
            exit 1
          fi
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
          echo "ALLOW_SEED=true" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3000" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_APP_URL=http://127.0.0.1:3000" >> "$GITHUB_ENV"

      - name: Preflight migrations and seed endpoint
        shell: bash
        run: |
          set -euo pipefail
          PRECHECK_PORT=3100

          echo "Resetting local Supabase DB to verify migrations..."
          pnpm supabase db reset --local --no-seed --yes

          echo "Starting Next.js app for seed preflight on port ${PRECHECK_PORT}..."
          pnpm dev --port "${PRECHECK_PORT}" > /tmp/next-preflight.log 2>&1 &
          NEXT_PID=$!

          cleanup() {
            if kill -0 "${NEXT_PID}" 2>/dev/null; then
              kill "${NEXT_PID}" || true
              wait "${NEXT_PID}" || true
            fi
            # pnpm can spawn child processes; ensure nothing remains on precheck port.
            pids="$(lsof -ti tcp:${PRECHECK_PORT} || true)"
            if [ -n "${pids}" ]; then
              kill ${pids} || true
            fi
          }
          trap cleanup EXIT

          status_code=""
          for attempt in {1..45}; do
            status_code="$(curl -sS -o /tmp/seed-preflight-response.json -w '%{http_code}' \
              "http://127.0.0.1:${PRECHECK_PORT}/api/seed?visibility=public" || true)"

            if [ "${status_code}" = "200" ]; then
              break
            fi

            if [ "${attempt}" -eq 45 ]; then
              echo "Seed preflight failed after ${attempt} attempts. Last HTTP status: ${status_code}"
              echo "--- /api/seed response ---"
              cat /tmp/seed-preflight-response.json || true
              echo "--- Next.js preflight logs (tail) ---"
              tail -n 200 /tmp/next-preflight.log || true
              exit 1
            fi

            sleep 2
          done

          node -e "const fs = require('fs'); const raw = fs.readFileSync('/tmp/seed-preflight-response.json', 'utf8'); let data; try { data = JSON.parse(raw); } catch (e) { console.error('Seed preflight returned non-JSON:', raw); process.exit(1); } if (!data.ok || !data.share_token) { console.error('Seed preflight returned invalid payload:', data); process.exit(1); } console.log('Seed preflight OK for token:', data.share_token);"

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: pnpm e2e
